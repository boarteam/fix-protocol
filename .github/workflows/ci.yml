name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (tsup → ESM + CJS + d.ts)
        run: pnpm -r build

      - name: Typecheck (tsc --strict)
        run: pnpm -r typecheck

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm format:check

      # Vitest runs the Node suites, the happy-dom browser smoke test, and the runnable
      # examples.
      - name: Test (Node + browser-like env)
        run: pnpm test

      - name: Browser-safety bundle check (no net/Buffer/crypto/joi/@nestjs)
        run: pnpm check:bundle

  compliance:
    name: audit & licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail on high/critical advisories in the production dependency graph (which should be
      # empty — the published packages are zero-dependency).
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
      # Informational: surface the license mix of the dependency graph.
      - name: List licenses
        run: pnpm licenses list || true

  dco:
    name: DCO sign-off
    # Human PRs must sign off (DCO). Skip bot-authored PRs — Dependabot, Renovate, and the
    # changesets "Version Packages" release PR are trusted automation that does not sign off.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          for sha in $(git rev-list "$base".."$head"); do
            if ! git log -1 --format='%b' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' line (see CONTRIBUTING.md / DCO)."
              missing=1
            fi
          done
          exit $missing
